<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Yield Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SF Mono', monospace; background: #0a0a0f; color: #00ff88; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #0052ff; font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .loading { color: #ffe600; }
        .error { color: #ff2d63; }
        .stale { color: #ffa500; font-size: 12px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px 8px; color: #666; border-bottom: 1px solid #333; font-size: 12px; }
        td { padding: 12px 8px; border-bottom: 1px solid #1a1a2e; font-size: 14px; }
        tr:hover { background: #1a1a2e; }
        .apy { color: #00ff88; font-weight: bold; }
        .apy-negative { color: #ff2d63; }
        .tvl { color: #00fff5; }
        .chain { color: #a0a0a0; }
        .updated { color: #666; font-size: 12px; margin-top: 20px; }
        .refresh-btn { background: #0052ff; color: white; border: none; padding: 8px 16px; cursor: pointer; margin-left: 10px; }
        .refresh-btn:hover { background: #0066ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🟦 Base Yield Scanner</h1>
        <p class="subtitle">Live yield opportunities on Base • Powered by DeFiLlama <button class="refresh-btn" onclick="loadYields()">↻</button></p>
        
        <div id="data">
            <p class="loading">Loading yield data...</p>
        </div>
        
        <p class="updated" id="updated"></p>
    </div>

    <script>
        // Sample fallback data (representative Base pools)
        const sampleData = [
            { project: "Aerodrome", symbol: "USDC", tvlUsd: 125000000, apy: 5.23 },
            { project: "Aerodrome", symbol: "USDbC", tvlUsd: 98000000, apy: 5.18 },
            { project: "BaseSwap", symbol: "USDC", tvlUsd: 45000000, apy: 4.87 },
            { project: "Moonwell", symbol: "ETH", tvlUsd: 32000000, apy: 4.52 },
            { project: "Aerodrome", symbol: "DAI", tvlUsd: 28000000, apy: 4.45 },
            { project: "Curve", symbol: "USD+", tvlUsd: 22000000, apy: 4.21 },
            { project: "BaseSwap", symbol: "USDbC", tvlUsd: 18000000, apy: 4.15 },
            { project: "Sonne", symbol: "USDC", tvlUsd: 15000000, apy: 3.89 },
            { project: "Aerodrome", symbol: "WBTC", tvlUsd: 12000000, apy: 2.45 },
            { project: "Moonwell", symbol: "USDC", tvlUsd: 8500000, apy: 3.67 }
        ];

        async function loadYields() {
            const dataEl = document.getElementById('data');
            dataEl.innerHTML = '<p class="loading">Loading yield data...</p>';
            
            try {
                // Try multiple CORS proxies
                const proxies = [
                    'https://api.allorigins.win/raw?url=',
                    'https://corsproxy.io/?',
                    'https://api.codetabs.com/v1/proxy?quest='
                ];
                
                const apiUrl = 'https://yields.llama.fi/pools';
                let result = null;
                let lastError = null;
                
                for (const proxy of proxies) {
                    try {
                        const response = await fetch(proxy + encodeURIComponent(apiUrl), { 
                            timeout: 10000 
                        });
                        if (response.ok) {
                            result = await response.json();
                            break;
                        }
                    } catch (e) {
                        lastError = e;
                        continue;
                    }
                }
                
                if (!result) {
                    throw new Error('All CORS proxies failed');
                }
                
                // Filter for Base chain
                const basePools = result.data.filter(p => p.chain === 'Base' && p.tvlUsd > 10000);
                
                // Sort by APY
                basePools.sort((a, b) => b.apy - a.apy);
                
                // Take top 15
                const top = basePools.slice(0, 15);
                
                if (top.length === 0) {
                    renderTable(sampleData, true);
                    return;
                }
                
                renderTable(top.map(p => ({
                    project: p.project,
                    symbol: p.symbol,
                    tvlUsd: p.tvlUsd,
                    apy: p.apy
                })), false);
                
            } catch (error) {
                console.error('Yield fetch failed:', error);
                renderTable(sampleData, true);
            }
        }
        
        function renderTable(data, isStale) {
            let html = isStale ? '<p class="stale">⚠️ Using cached data (API unavailable)</p>' : '';
            html += '<table><thead><tr><th>Project</th><th>Token</th><th>TVL</th><th>APY</th></tr></thead><tbody>';
            
            data.forEach(pool => {
                const apyClass = pool.apy > 0 ? 'apy' : 'apy-negative';
                const tvl = pool.tvlUsd > 1000000 
                    ? '$' + (pool.tvlUsd / 1000000).toFixed(1) + 'M'
                    : '$' + (pool.tvlUsd / 1000).toFixed(0) + 'K';
                
                html += `<tr>
                    <td>${pool.project}</td>
                    <td>${pool.symbol}</td>
                    <td class="tvl">${tvl}</td>
                    <td class="${apyClass}">${pool.apy?.toFixed(2) || '0.00'}%</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            document.getElementById('data').innerHTML = html;
            document.getElementById('updated').textContent = 'Updated: ' + new Date().toLocaleString();
        }
        
        loadYields();
    </script>
</body>
</html>
